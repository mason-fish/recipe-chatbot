apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-chatbot
  namespace: ${OKTETO_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recipe-chatbot
  template:
    metadata:
      labels:
        app: recipe-chatbot
    spec:
      containers:
      - name: recipe-chatbot
        image: ${OKTETO_BUILD_RECIPE_CHATBOT_IMAGE}
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_NAME
          value: "${MODEL_NAME:-openai/gpt-4o-mini}"
        - name: OPENAI_API_KEY
          value: "${OPENAI_API_KEY}"
        - name: ANTHROPIC_API_KEY
          value: "${ANTHROPIC_API_KEY}"
        - name: TOGETHER_API_KEY
          value: "${TOGETHER_API_KEY}"
        - name: GEMINI_API_KEY
          value: "${GEMINI_API_KEY}"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recipe-chatbot
  namespace: ${OKTETO_NAMESPACE}
spec:
  selector:
    app: recipe-chatbot
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recipe-chatbot
  namespace: ${OKTETO_NAMESPACE}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: recipe-chatbot-${OKTETO_NAMESPACE}.${OKTETO_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: recipe-chatbot
            port:
              number: 8000